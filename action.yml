name: github-api-usage-monitor
description: Monitor GitHub API rate-limit usage during a job by polling /rate_limit.
author: 'Really Him'

branding:
  icon: activity
  color: gray-dark

inputs:
  token:
    description: 'GitHub token (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}

outputs:
  state_json:
    description: 'Finalized reducer state as a JSON string'
  poll_log_json:
    description: 'Poll log entries as a JSON array string'

runs:
  using: node20
  pre: dist/pre.js
  main: dist/main.js
  post: dist/post.js
  post-if: always()
