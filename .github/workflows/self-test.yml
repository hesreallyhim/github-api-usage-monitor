    outputs:
      state_json: ${{ steps.monitor.outputs.state_json }}
      poll_log_json: ${{ steps.monitor.outputs.poll_log_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Start monitor
        id: monitor
        uses: hesreallyhim/github-api-usage-monitor@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Scenario: 5 GraphQL calls"
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 5x graphql
          for i in $(seq 1 5); do
            echo "--- graphql call $i ---"
            curl -s -o /dev/null -w "HTTP %{http_code}\n" \
                -D - \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"query":"{ viewer { login } }"}' \
                "https://api.github.com/graphql" \
              2>&1 | grep -iE '(^HTTP|x-ratelimit)'
            sleep 2
          done

      - name: "Wait for polls (90s total)"
        run: sleep 70

      - name: Dump state.json
        run: |
          STATE_FILE="${RUNNER_TEMP}/github-api-usage-monitor/state.json"
          echo "=== graphql-5: state.json ==="
          if [ -f "$STATE_FILE" ]; then
            cat "$STATE_FILE" | python3 -m json.tool
          else
            echo "state.json not found"
          fi

      - name: Validate expectations
        env:
          STATE_DIR: ${{ runner.temp }}/github-api-usage-monitor
          STRICT_VALIDATION: ${{ inputs.strict_validation }}
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          state_path = os.path.join(os.environ['STATE_DIR'], 'state.json')
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          # GitHub Actions boolean inputs produce empty string for false, 'true' for true
          strict = os.environ.get('STRICT_VALIDATION', '') == 'true'

          if not os.path.exists(state_path):
              msg = 'SKIP — state.json not found'
              print(msg)
              if summary_path:
                  with open(summary_path, 'a') as f:
                      f.write(msg + '\n')
              sys.exit(1 if strict else 0)

          with open(state_path) as f:
              state = json.load(f)
          buckets = state.get('buckets', {})
          expectations = {
              'graphql': {'delta': 5, 'max_windows': 0}
          }
          results = []  # list of (bucket, check_name, passed, detail)
          for bucket_name, expect in expectations.items():
              b = buckets.get(bucket_name)
              if not b:
                  results.append((bucket_name, 'exists', False, 'not found in state'))
                  continue
              used_ok = b['total_used'] >= expect['delta']
              results.append((bucket_name, 'total_used', used_ok,
                  str(b['total_used']) + ' (expected >= ' + str(expect['delta']) + ')'))
              win_ok = b['windows_crossed'] <= expect['max_windows']
              results.append((bucket_name, 'windows_crossed', win_ok,
                  str(b['windows_crossed']) + ' (expected <= ' + str(expect['max_windows']) + ')'))

          # Write markdown summary
          md = []
          all_passed = all(r[2] for r in results)
          icon = 'PASS' if all_passed else 'FAIL'
          md.append('### Validation: ' + icon)
          md.append('')
          md.append('| Bucket | Check | Result | Detail |')
          md.append('|--------|-------|:------:|--------|')
          for bucket_name, check, passed, detail in results:
              mark = 'pass' if passed else 'FAIL'
              md.append('| ' + bucket_name + ' | ' + check + ' | ' + mark + ' | ' + detail + ' |')
          md.append('')
          md_text = '\n'.join(md)
          print(md_text)
          if summary_path:
              with open(summary_path, 'a') as f:
                  f.write(md_text + '\n')

          # Only fail the step when strict validation is enabled
          if not all_passed and strict:
              sys.exit(1)
          PYEOF

  graphql-5-diag:
    runs-on: ubuntu-latest
    needs: [graphql-5]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Render diagnostics
        env:
          STATE_JSON: ${{ needs.graphql-5.outputs.state_json }}
          POLL_LOG_JSON: ${{ needs.graphql-5.outputs.poll_log_json }}
          SCENARIO_NAME: "5 GraphQL calls"
        run: |
          node -e "
            const fs = require('fs');
            fs.mkdirSync('/tmp/diag', {recursive: true});
            fs.writeFileSync('/tmp/diag/state.json', process.env.STATE_JSON || '{}');
            const log = JSON.parse(process.env.POLL_LOG_JSON || '[]');
            fs.writeFileSync('/tmp/diag/poll-log.jsonl',
              log.map(e => JSON.stringify(e)).join('\n'));
          "
          STATE_DIR=/tmp/diag SCENARIO_NAME="$SCENARIO_NAME" \
            node scripts/render-diagnostics.mjs >> "$GITHUB_STEP_SUMMARY"
